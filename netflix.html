<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Meu Trabalho</title>
    <style>
        body { background-color: #141414; color: white; font-family: Helvetica, Arial, sans-serif; margin: 0; }
        header { padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0)); }
        .logo { width: 120px; color: #e50914; font-size: 30px; font-weight: bold; }
        .banner { height: 60vh; background: url('https://source.unsplash.com/random/1600x900/?movie') center/cover; display: flex; align-items: center; padding: 40px; }
        .row { padding: 20px; }
        .posters { display: flex; gap: 10px; overflow-x: scroll; padding: 20px 0; }
        .poster { min-width: 160px; height: 230px; background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <header><div class="logo">NETFLIX (FAKE)</div></header>
    
    <div class="banner">
        <div>
            <h1>Meu Projeto Escolar</h1>
            <p>A melhor série de programação que você já viu.</p>
        </div>
    </div>

    <div class="row">
        <h2>Minhas Matérias Favoritas</h2>
        <div class="posters">
            <div class="poster">Temporada 1: <br>Programação</div>
            <div class="poster">Temporada 2: <br>Ciências</div>
            <div class="poster">Temporada 3: <br>História</div>
            <div class="poster">Temporada 4: <br>Zoeira</div>
        </div>
    </div>
</body>
</html>
